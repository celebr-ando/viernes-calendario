<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIERNES. — Calendario de contenido</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --azul: #374655;
    --salvia: #95a996;
    --dorado: #d4af37;
    --amarillo: #fdda6a;
    --grafito: #545f62;
    --crema: #F5F3EE;
    --blanco: #ffffff;
    --borde: #e8e5df;
    --texto: #1a2530;
    --texto-muted: #7a8a90;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--crema);
    color: var(--texto);
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: var(--azul);
    padding: 32px 48px 28px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .header-left .marca {
    font-size: 36px;
    font-weight: 800;
    color: var(--blanco);
    letter-spacing: -0.03em;
    line-height: 1;
  }
  .header-left .marca span { color: var(--amarillo); }
  .header-left .subtitulo {
    font-size: 13px;
    color: var(--salvia);
    margin-top: 4px;
  }
  .header-right {
    text-align: right;
  }
  .header-right .mes {
    font-size: 22px;
    font-weight: 700;
    color: var(--blanco);
    letter-spacing: -0.01em;
  }
  .header-right .prog {
    font-size: 12px;
    color: var(--salvia);
    margin-top: 4px;
  }

  /* MODE BADGE */
  .mode-bar {
    background: var(--azul);
    padding: 0 48px 16px;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .mode-badge {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
  }
  .mode-badge.editor {
    background: var(--amarillo);
    color: var(--azul);
  }
  .mode-badge.reader {
    background: transparent;
    color: var(--salvia);
    border: 1px solid rgba(149,169,150,0.4);
  }
  .mode-badge.reader.active {
    background: rgba(149,169,150,0.15);
    color: var(--salvia);
  }
  .mode-badge.editor.active {
    background: var(--amarillo);
    color: var(--azul);
  }
  .mode-hint {
    font-size: 11px;
    color: var(--salvia);
    opacity: 0.7;
    margin-left: 8px;
  }

  /* CONTAINER */
  .container { max-width: 1100px; margin: 0 auto; padding: 40px 32px 80px; }

  /* PROGRESS BAR */
  .progress-bar-wrap {
    background: var(--blanco);
    border-radius: 8px;
    border: 0.5px solid var(--borde);
    padding: 16px 20px;
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .progress-track {
    flex: 1;
    height: 4px;
    background: var(--borde);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--dorado);
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  .progress-label { font-size: 13px; color: var(--grafito); white-space: nowrap; }
  .progress-num { font-size: 13px; font-weight: 700; color: var(--azul); white-space: nowrap; }

  /* WEEK */
  .week { margin-bottom: 40px; }
  .week-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 2px solid var(--dorado);
  }
  .week-title {
    font-size: 17px;
    font-weight: 700;
    color: var(--azul);
    letter-spacing: -0.01em;
  }
  .week-count {
    font-size: 12px;
    color: var(--texto-muted);
    background: var(--borde);
    padding: 3px 10px;
    border-radius: 20px;
  }

  /* GRID */
  .posts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }

  /* CARD */
  .post-card {
    background: var(--blanco);
    border-radius: 12px;
    border: 0.5px solid var(--borde);
    padding: 16px;
    transition: opacity 0.2s, border-color 0.2s;
    position: relative;
  }
  .post-card.done {
    opacity: 0.5;
    border-color: var(--borde);
  }
  .post-card:hover { border-color: #c8c4bc; }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 10px;
  }
  .card-tags { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

  .tag-network {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 20px;
  }
  .tag-network.instagram { background: #FAEEDA; color: #633806; }
  .tag-network.linkedin { background: #E6F1FB; color: #0C447C; }
  .tag-network.stories { background: #EEEDFE; color: #3C3489; }
  .tag-network.tiktok { background: #FBEAF0; color: #72243E; }
  .tag-network.youtube { background: #FAECE7; color: #712B13; }
  .tag-network.newsletter { background: #E1F5EE; color: #085041; }

  .tag-day {
    font-size: 11px;
    color: var(--texto-muted);
  }
  .tag-type {
    font-size: 11px;
    color: var(--texto-muted);
  }

  .card-checkbox {
    width: 20px;
    height: 20px;
    cursor: pointer;
    flex-shrink: 0;
    accent-color: var(--azul);
  }
  .card-checkbox.readonly { pointer-events: none; }

  .card-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--texto);
    line-height: 1.4;
    margin-bottom: 10px;
  }
  .post-card.done .card-title { text-decoration: line-through; }

  .card-published-badge {
    display: none;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #085041;
    background: #E1F5EE;
    padding: 3px 8px;
    border-radius: 4px;
    margin-bottom: 8px;
  }
  .post-card.done .card-published-badge { display: inline-block; }

  .card-toggle-body {
    font-size: 12px;
    color: var(--dorado);
    font-weight: 600;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  .card-actions-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .card-copy-btn {
    font-size: 12px;
    color: var(--azul);
    font-weight: 600;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .card-copy-btn:hover { color: #2a3540; }
  .card-copy-btn.copied { color: #0F6E56; }
  .card-body { user-select: text; -webkit-user-select: text; }
  .card-body {
    margin-top: 10px;
    padding: 12px;
    background: var(--crema);
    border-radius: 8px;
    font-size: 12px;
    color: var(--grafito);
    white-space: pre-wrap;
    line-height: 1.7;
    display: none;
  }
  .card-body.visible { display: block; }

  /* EDITOR CONTROLS */
  .editor-controls {
    display: none;
    justify-content: flex-end;
    margin-top: 10px;
  }
  .editor-mode .editor-controls { display: flex; }
  .btn-delete {
    background: none;
    border: none;
    color: var(--texto-muted);
    cursor: pointer;
    font-size: 12px;
    padding: 4px 8px;
    border-radius: 4px;
    transition: color 0.15s, background 0.15s;
  }
  .btn-delete:hover { color: #c0392b; background: #fdf0ef; }

  /* ADD BUTTONS */
  .add-controls {
    display: none;
    gap: 10px;
    margin-top: 32px;
  }
  .editor-mode .add-controls { display: flex; }
  .btn-add {
    padding: 10px 20px;
    background: var(--azul);
    color: var(--blanco);
    border: none;
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-add:hover { background: #2a3540; }
  .btn-add.secondary {
    background: transparent;
    color: var(--azul);
    border: 1.5px solid var(--borde);
  }
  .btn-add.secondary:hover { background: var(--borde); }

  /* LEGEND */
  .legend {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--grafito);
  }
  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* FOOTER */
  .footer {
    background: var(--azul);
    padding: 24px 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .footer-marca { font-size: 16px; font-weight: 800; color: var(--blanco); letter-spacing: -0.02em; }
  .footer-marca span { color: var(--amarillo); }
  .footer-by { font-size: 11px; color: var(--salvia); }

  /* VIEW TABS */
  .view-tabs { display: flex; gap: 8px; margin-bottom: 28px; }
  .tab-btn {
    padding: 9px 18px;
    border-radius: 8px;
    border: 1px solid var(--borde);
    background: var(--blanco);
    color: var(--grafito);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tab-btn:hover { border-color: #c8c4bc; }
  .tab-btn.active { background: var(--azul); color: var(--blanco); border-color: var(--azul); }

  /* SLOGANS */
  .slogan-category { margin-bottom: 32px; }
  .slogan-category-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--azul);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--dorado);
  }
  .slogan-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
  .slogan-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--blanco);
    border: 0.5px solid var(--borde);
    border-radius: 8px;
    padding: 10px 14px;
  }
  .slogan-checkbox { width: 18px; height: 18px; cursor: pointer; flex-shrink: 0; accent-color: var(--azul); }
  .slogan-text { flex: 1; font-size: 13px; color: var(--texto); line-height: 1.4; }
  .slogan-item.checked .slogan-text { text-decoration: line-through; color: var(--texto-muted); }
  .slogan-delete {
    background: none;
    border: none;
    color: #b0aba2;
    cursor: pointer;
    font-size: 16px;
    padding: 2px 6px;
    flex-shrink: 0;
  }
  .slogan-delete:hover { color: #c0392b; }
  .slogan-add-row { display: flex; gap: 8px; }
  .slogan-add-input {
    flex: 1;
    padding: 9px 12px;
    border: 1px solid var(--borde);
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: var(--texto);
  }
  .slogan-add-input:focus { outline: none; border-color: var(--azul); }
  .slogan-add-btn {
    padding: 9px 16px;
    background: var(--azul);
    color: var(--blanco);
    border: none;
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .slogan-add-btn:hover { background: #2a3540; }

  /* READER OVERLAY MSG */
  .reader-msg {
    display: none;
    background: rgba(55,70,85,0.08);
    border: 1px solid var(--borde);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 13px;
    color: var(--grafito);
    margin-bottom: 20px;
    text-align: center;
  }
  .reader-mode .reader-msg { display: block; }

  @media (max-width: 600px) {
    .header { padding: 24px 20px 20px; flex-direction: column; gap: 12px; align-items: flex-start; }
    .mode-bar { padding: 0 20px 14px; }
    .container { padding: 24px 16px 60px; }
    .footer { padding: 20px; flex-direction: column; gap: 8px; text-align: center; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="marca">VIERNES<span>.</span></div>
    <div class="subtitulo">Calendario de contenido · Desde Adentro</div>
  </div>
  <div class="header-right">
    <div class="mes">Julio 2026</div>
    <div class="prog" id="header-prog">Cargando...</div>
  </div>
</div>

<div class="mode-bar">
  <button class="mode-badge editor active" id="btn-editor" onclick="setMode('editor')">Modo editor</button>
  <button class="mode-badge reader" id="btn-reader" onclick="setMode('reader')">Modo cliente</button>
  <span class="mode-hint" id="mode-hint">Podés tildar, editar y borrar</span>
</div>

<div class="container" id="main-container">

  <div class="view-tabs">
    <button class="tab-btn active" id="tab-calendario" onclick="setView('calendario')">🗓️ Calendario</button>
    <button class="tab-btn" id="tab-slogans" onclick="setView('slogans')">💬 Slogans</button>
  </div>

  <div id="calendario-view">

    <div class="progress-bar-wrap">
      <span class="progress-label">Progreso del mes</span>
      <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
      <span class="progress-num" id="prog-num">0 / 0</span>
    </div>

    <div class="reader-msg">Vista de cliente — solo lectura. Para editar, usá el modo editor.</div>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#d4af37"></div> Instagram</div>
      <div class="legend-item"><div class="legend-dot" style="background:#185FA5"></div> LinkedIn</div>
      <div class="legend-item"><div class="legend-dot" style="background:#534AB7"></div> Stories</div>
      <div class="legend-item"><div class="legend-dot" style="background:#993C1D"></div> YouTube</div>
      <div class="legend-item"><div class="legend-dot" style="background:#0F6E56"></div> Newsletter</div>
    </div>

    <div id="weeks-root"></div>

    <div class="add-controls">
      <button class="btn-add" onclick="addWeek()">+ Nueva semana</button>
      <button class="btn-add secondary" onclick="exportData()">Exportar datos</button>
    </div>

  </div>

  <div id="slogans-view" style="display:none;">
    <div id="slogans-root"></div>
  </div>

</div>

<div class="footer">
  <div class="footer-marca">VIERNES<span>.</span></div>
  <div class="footer-by">Preparado por Desde Adentro · Julio 2026</div>
</div>

<script>

  weeks: [
    {
      id: 'w1',

      posts: [
        { id: 'p1', network: 'instagram', type: 'Carrusel', day: 'Lunes', title: 'El Excel dice que estás bien. Pero no te está mostrando todo.', body: 'Hook: El Excel dice que estás bien. Pero no te está mostrando todo.\n\nSlides:\n1. El Excel dice que estás bien. Pero no te está mostrando todo.\n2. Todos los lunes, antes de abrir, revisás los números. Abrís el Excel, el cuaderno, el resumen del banco, los mensajes de WhatsApp con los que te deben. Cruzás todo en la cabeza y llegás a un número. Tu número.\n3. El problema no es que el número esté mal. El problema es el tiempo que te llevó armarlo. Y que la semana que viene tenés que hacerlo de nuevo.\n4. Mientras tanto, hay un cliente al que no llamaste. Una oportunidad que no viste. Una decisión que postergaste.\n5. Eso tiene un nombre. Se llama costo de oportunidad. Y lo estás pagando todos los lunes.\n6. Si esto te pasa todos los lunes, quedáte cerca. Pronto vas a tener la solución. VIERNES.\n\nCaption: Todos los lunes perdés algo que no es plata. No es el número lo que está mal. Es el tiempo que te lleva armarlo. ¿Te reconocés en esto? Quedáte cerca.\n\n#pymesargentinas #dueñodenegocio #gestiónpyme #flujodecaja #costodeoportunidad', done: false },

        { id: 'p3', network: 'instagram', type: 'Placa', day: 'Jueves', title: 'La pregunta más importante de una PyME no es cuánto vendiste. Es si te va a alcanzar la semana que viene.', body: 'Caption: Todos los meses hay una semana que aprieta más que las otras. ¿Sabés cuándo va a ser la tuya?\n\n#pymesargentinas #dueñodenegocio #gestiónpyme #finanzasparapymes #emprendedoresargentinos', done: false },
        { id: 'p4', network: 'stories', type: 'Encuesta', day: 'Lunes', title: '¿Cuánto tiempo perdés por semana armando tus números?', body: 'Opciones: menos de 1h · 1 a 3h · más de 3h · no los armo', done: false },

        { id: 'p7', network: 'instagram', type: 'Carrusel', day: 'Lunes', title: 'Todos los lunes perdés algo que no es plata.', body: 'Hook: Todos los lunes perdés algo que no es plata.\n\nCaption: Todos los lunes perdés algo que no es plata. No es el número lo que está mal. Es el tiempo que te lleva armarlo. Y todo lo que dejás de hacer mientras tanto. ¿Te reconocés en esto? Quedáte cerca.\n\n#pymesargentinas #dueñodenegocio #gestiónpyme #flujodecaja #costodeoportunidad', done: true },
        { id: 'p8', network: 'linkedin', type: 'Carrusel PDF', day: 'Martes', title: 'Los 3 números que todo dueño debería conocer', body: 'Slide 1: Los 3 números que todo dueño debería conocer\n\nSlide 2: Muchos dueños saben cuánto vendieron este mes. Algunos saben cuánto ganaron. Pero hay tres números que suelen tener más impacto en las decisiones del negocio.\n\nSlide 3: 1. ¿Cuánto tiempo podrías operar si mañana dejaras de cobrar?\n\nSlide 4: No es una situación real. Es un ejercicio. Pero revela algo importante: ¿Cuánto margen de maniobra tiene tu empresa ante un imprevisto?\n\nSlide 5: 2. ¿Tu negocio genera dinero o lo consume?\n\nSlide 6: No alcanza con saber si entra y sale plata. Lo importante es entender la velocidad. Porque una empresa que consume efectivo rápidamente tiene menos tiempo para reaccionar.\n\nSlide 7: 3. ¿Cuánta plata está quieta? Cuando falta dinero lo vemos enseguida. Cuando sobra, muchas veces pasa desapercibido. Pero el dinero inmovilizado también tiene un costo.\n\nSlide 8: La salud financiera de una empresa no depende solamente de cuánto vende. También depende de cuánto tiempo tiene, cómo usa sus recursos y qué hace con sus excedentes. ¿Conocés estos tres números de tu negocio?\n\nCaption: La mayoría de los dueños conoce sus ventas. Algunos conocen su rentabilidad. Pero muy pocos conocen los indicadores que realmente condicionan sus decisiones.\n¿Cuánto tiempo podrías operar ante un imprevisto?\n¿Tu negocio genera dinero o lo consume?\n¿Cuánta plata está quieta sin generar valor?\nEntender estas tres variables puede cambiar la forma en que gestionás tu empresa.\n\n#PyMEs #Negocios #Empresas #GestiónEmpresarial #FinanzasPyME', done: false },
        { id: 'p9', network: 'instagram', type: 'Placa', day: 'Jueves', title: 'Tomar una decisión financiera sin información clara no es valentía. Es improvisación.', body: 'Caption: Contratar, invertir, financiarse, aumentar precios. Todas decisiones que se toman todos los días. Casi siempre sin ver lo que viene. ¿Cuándo fue la última vez que decidiste algo grande con total claridad sobre tu caja?\n\n#pymesargentinas #flujodecaja #dueñodenegocio #gestiónpyme #decisiones', done: false },
        { id: 'p10', network: 'linkedin', type: 'Post actualidad', day: 'Jueves', title: 'La inflación de mayo fue 2,1%. La más baja en 8 meses.', body: 'La inflación de mayo fue 2,1%. La más baja en 8 meses. Buena noticia. Pero también una señal de que algo cambió en las reglas del juego. Cuando los precios se mueven menos, las decisiones pesan más. ¿Lo estás viendo en tu negocio?\n\n#pymesargentinas #gestionpyme #negocios #empresas', done: false },

let slogans = JSON.parse(JSON.stringify(DEFAULT_SLOGANS));
let slogansDeletedIds = new Set();

function loadSlogansFromStorage() {
  try {
    const saved = localStorage.getItem('viernes-slogans-v1');
    if (!saved) return;
    const savedObj = JSON.parse(saved);
    slogansDeletedIds = new Set(savedObj.deletedIds || []);
    const checkedMap = {};
    (savedObj.categories || []).forEach(c => (c.items || []).forEach(it => { checkedMap[it.id] = it.checked; }));

    slogans.forEach(cat => {
      cat.items = cat.items.filter(it => !slogansDeletedIds.has(it.id));
      cat.items.forEach(it => {
        if (Object.prototype.hasOwnProperty.call(checkedMap, it.id)) it.checked = checkedMap[it.id];
      });
    });

    (savedObj.categories || []).forEach(savedCat => {
      const targetCat = slogans.find(c => c.id === savedCat.id);
      if (!targetCat) return;
      (savedCat.items || []).forEach(it => {
        if (it.id && it.id.indexOf('custom-') === 0 && !slogansDeletedIds.has(it.id)) {
          targetCat.items.push(it);
        }
      });
    });
  } catch(e) {}
}

function saveSlogansToStorage() {
  try {
    localStorage.setItem('viernes-slogans-v1', JSON.stringify({
      categories: slogans,
      deletedIds: Array.from(slogansDeletedIds)
    }));
  } catch(e) {}
}

function toggleSlogan(catId, itemId) {
  const cat = slogans.find(c => c.id === catId);
  const item = cat.items.find(i => i.id === itemId);
  item.checked = !item.checked;
  saveSlogansToStorage();
  renderSlogans();
}

function addSloganFromInput(catId) {
  const input = document.getElementById('slogan-input-' + catId);
  const text = input.value.trim();
  if (!text) return;
  const cat = slogans.find(c => c.id === catId);
  cat.items.push({ id: 'custom-' + uid(), text: text, checked: false });
  input.value = '';
  saveSlogansToStorage();
  renderSlogans();
}

function deleteSlogan(catId, itemId) {
  const cat = slogans.find(c => c.id === catId);
  cat.items = cat.items.filter(i => i.id !== itemId);
  if (itemId.indexOf('custom-') !== 0) slogansDeletedIds.add(itemId);
  saveSlogansToStorage();
  renderSlogans();
}

window.toggleSlogan = toggleSlogan;
window.addSloganFromInput = addSloganFromInput;
window.deleteSlogan = deleteSlogan;

function renderSlogans() {
  const root = document.getElementById('slogans-root');
  root.innerHTML = '';

  slogans.forEach(cat => {
    const catEl = document.createElement('div');
    catEl.className = 'slogan-category';

    const title = document.createElement('div');
    title.className = 'slogan-category-title';
    title.textContent = cat.name;
    catEl.appendChild(title);

    const list = document.createElement('div');
    list.className = 'slogan-list';
    cat.items.forEach(item => {
      const row = document.createElement('div');
      row.className = 'slogan-item' + (item.checked ? ' checked' : '');
      row.innerHTML =
        '<input type="checkbox" class="slogan-checkbox" ' + (item.checked ? 'checked' : '') + ' onchange="toggleSlogan(\'' + cat.id + '\',\'' + item.id + '\')" />' +
        '<span class="slogan-text"></span>' +
        '<button class="slogan-delete" onclick="deleteSlogan(\'' + cat.id + '\',\'' + item.id + '\')" title="Eliminar">×</button>';
      row.querySelector('.slogan-text').textContent = item.text;
      list.appendChild(row);
    });
    catEl.appendChild(list);

    const addRow = document.createElement('div');
    addRow.className = 'slogan-add-row';
    addRow.innerHTML =
      '<input type="text" class="slogan-add-input" id="slogan-input-' + cat.id + '" placeholder="Agregar otro slogan..." onkeydown="if(event.key===\'Enter\') addSloganFromInput(\'' + cat.id + '\')" />' +
      '<button class="slogan-add-btn" onclick="addSloganFromInput(\'' + cat.id + '\')">+ Agregar</button>';
    catEl.appendChild(addRow);

    root.appendChild(catEl);
  });
}

let data = JSON.parse(JSON.stringify(DEFAULT_DATA));
let currentMode = 'editor';
let expandedPosts = new Set();

function loadFromStorage() {
  try {
    const saved = localStorage.getItem('viernes-cal-v2');
    if (!saved) return;
    const savedData = JSON.parse(saved);
    const doneMap = {};
    (savedData.weeks || []).forEach(w => w.posts.forEach(p => { doneMap[p.id] = p.done; }));
    data.weeks.forEach(w => w.posts.forEach(p => {
      if (Object.prototype.hasOwnProperty.call(doneMap, p.id)) p.done = doneMap[p.id];
    }));
  } catch(e) {}
}

function saveToStorage() {
  try { localStorage.setItem('viernes-cal-v2', JSON.stringify(data)); } catch(e) {}
}

function uid() { return 'id' + Math.random().toString(36).slice(2,9); }

function setMode(mode) {
  currentMode = mode;
  const container = document.getElementById('main-container');
  container.className = 'container ' + mode + '-mode';
  document.getElementById('btn-editor').className = 'mode-badge editor' + (mode === 'editor' ? ' active' : '');
  document.getElementById('btn-reader').className = 'mode-badge reader' + (mode === 'reader' ? ' active' : '');
  document.getElementById('mode-hint').textContent = mode === 'editor' ? 'Podés tildar, editar y borrar' : 'Vista del cliente — solo lectura';
  render();
}

function countProgress() {
  let total = 0, done = 0;
  data.weeks.forEach(w => w.posts.forEach(p => { total++; if (p.done) done++; }));
  return { total, done };
}

function updateProgress() {
  const { total, done } = countProgress();
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-num').textContent = done + ' / ' + total + ' publicados';
  document.getElementById('header-prog').textContent = pct + '% del mes completado';
}

function togglePost(wid, pid) {
  if (currentMode !== 'editor') return;
  const w = data.weeks.find(x => x.id === wid);
  const p = w.posts.find(x => x.id === pid);
  p.done = !p.done;
  saveToStorage();
  render();
}

function toggleBody(pid) {
  if (expandedPosts.has(pid)) expandedPosts.delete(pid);
  else expandedPosts.add(pid);
  render();
}

function findPost(pid) {
  for (const w of data.weeks) {
    const p = w.posts.find(x => x.id === pid);
    if (p) return p;
  }
  return null;
}

function copyBody(pid, btn) {
  const post = findPost(pid);
  if (!post) return;
  const text = post.body || post.title;
  const done = () => {
    if (!btn) return;
    const original = btn.dataset.label;
    btn.textContent = '✓ ¡Copiado!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = original; btn.classList.remove('copied'); }, 1500);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
  } else {
    fallbackCopy(text, done);
  }
}

function fallbackCopy(text, done) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand('copy'); done(); } catch(e) {}
  document.body.removeChild(ta);
}

function deletePost(wid, pid) {
  const w = data.weeks.find(x => x.id === wid);
  w.posts = w.posts.filter(p => p.id !== pid);
  saveToStorage();
  render();
}

function deleteWeek(wid) {
  if (!confirm('¿Eliminar esta semana y todos sus posteos?')) return;
  data.weeks = data.weeks.filter(w => w.id !== wid);
  saveToStorage();
  render();
}

function addWeek() {
  data.weeks.push({ id: uid(), title: 'Nueva semana', posts: [] });
  saveToStorage();
  render();
}

function exportData() {
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'viernes-calendario-julio2026.json';
  a.click();
}

window.togglePost = togglePost;
window.toggleBody = toggleBody;
window.deletePost = deletePost;
window.deleteWeek = deleteWeek;
window.addWeek = addWeek;
window.exportData = exportData;

function render() {
  updateProgress();
  const root = document.getElementById('weeks-root');
  root.innerHTML = '';

  data.weeks.forEach(week => {
    const doneCount = week.posts.filter(p => p.done).length;

    const weekEl = document.createElement('div');
    weekEl.className = 'week';

    const header = document.createElement('div');
    header.className = 'week-header';
    header.innerHTML =
      '<div style="display:flex; align-items:center; gap:12px; flex:1;">' +
        '<span class="week-title">' + week.title + '</span>' +
        '<span class="week-count">' + doneCount + '/' + week.posts.length + '</span>' +
      '</div>' +
      (currentMode === 'editor' ? '<button onclick="deleteWeek(\'' + week.id + '\')" style="background:none;border:none;color:#b0aba2;cursor:pointer;font-size:18px;padding:4px 8px;" title="Eliminar semana">×</button>' : '');
    weekEl.appendChild(header);

    const grid = document.createElement('div');
    grid.className = 'posts-grid';

    week.posts.forEach(post => {
      const expanded = expandedPosts.has(post.id);
      const card = document.createElement('div');
      card.className = 'post-card' + (post.done ? ' done' : '');

      card.innerHTML =
        '<div class="card-top">' +
          '<div class="card-tags">' +
            '<span class="tag-network ' + post.network + '">' + post.network.charAt(0).toUpperCase() + post.network.slice(1) + '</span>' +
            '<span class="tag-day">' + (post.day || '') + '</span>' +
            '<span class="tag-type">' + post.type + '</span>' +
          '</div>' +
          '<input type="checkbox" class="card-checkbox' + (currentMode !== 'editor' ? ' readonly' : '') + '" ' + (post.done ? 'checked' : '') + ' onchange="togglePost(\'' + week.id + '\',\'' + post.id + '\')" />' +
        '</div>' +
        '<div class="card-published-badge">✓ Publicado</div>' +
        '<div class="card-title">' + post.title + '</div>' +
        '<div class="card-actions-row">' +
          (post.body ? '<button class="card-toggle-body" onclick="toggleBody(\'' + post.id + '\')">' + (expanded ? '↑ Ocultar copy' : '↓ Ver copy completo') + '</button>' : '') +
          '<button class="card-copy-btn" data-label="📋 Copiar copy" onclick="copyBody(\'' + post.id + '\', this)">📋 Copiar copy</button>' +
        '</div>' +
        (post.body && expanded ? '<div class="card-body visible">' + post.body + '</div>' : '<div class="card-body"></div>') +
        (currentMode === 'editor' ? '<div class="editor-controls"><button class="btn-delete" onclick="deletePost(\'' + week.id + '\',\'' + post.id + '\')">Eliminar</button></div>' : '');

      grid.appendChild(card);
    });

    weekEl.appendChild(grid);
    root.appendChild(weekEl);
  });
}
